<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - ObjectIQ Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .report-container {
            padding: 24px;
        }
        .report-header {
            margin-bottom: 24px;
        }
        .report-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .report-header p {
            color: var(--gray-light);
        }
        .report-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .report-card h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray-light);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--white);
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-success {
            background: var(--success);
            color: var(--white);
        }
        .btn-success:hover {
            background: #059669;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .stat-box {
            background: var(--dark);
            padding: 20px;
            border-radius: var(--radius-sm);
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-box .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-box .label {
            color: var(--gray-light);
            font-size: 0.875rem;
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-eye"></i>
                    <span>ObjectIQ</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item admin-only" onclick="window.location.href='/dashboard'">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
                <a href="#" class="nav-item" onclick="window.location.href='/dashboard'">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="/report" class="nav-item active">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item admin-only" onclick="window.location.href='/dashboard'">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">{{ user.username }}</span>
                        <span class="user-role">{{ user.role }}</span>
                    </div>
                </div>
                <a href="/logout" class="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Reports</h1>
                </div>
                <div class="topbar-right">
                    <div class="topbar-time" id="current-time"></div>
                </div>
            </header>

            <!-- Report Content -->
            <div class="report-container">
                <div class="report-header">
                    <h1><i class="fas fa-file-alt"></i> Report Generation</h1>
                    <p>Generate PDF reports and export detection data</p>
                </div>

                <div class="report-card">
                    <h2><i class="fas fa-calendar-alt"></i> Report Parameters</h2>
                    <form id="report-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Start Date</label>
                                <input type="date" id="start-date">
                            </div>
                            <div class="form-group">
                                <label>End Date</label>
                                <input type="date" id="end-date">
                            </div>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-primary" onclick="generatePDF()">
                                <i class="fas fa-file-pdf"></i> Generate PDF Report
                            </button>
                            <button type="button" class="btn btn-success" onclick="exportCSV()">
                                <i class="fas fa-file-csv"></i> Export CSV
                            </button>
                        </div>
                    </form>
                </div>

                <div class="report-card">
                    <h2><i class="fas fa-chart-bar"></i> Summary Statistics</h2>
                    <div class="stats-grid" id="stats-grid">
                        <div class="stat-box">
                            <div class="value" id="stat-total">0</div>
                            <div class="label">Total Detections</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="stat-alerts">0</div>
                            <div class="label">Alerts Today</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="stat-suspicious">0</div>
                            <div class="label">Suspicious Activities</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="stat-crowd">0</div>
                            <div class="label">Max Crowd</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString();
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Toggle sidebar
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        }

        // Set default dates
        const today = new Date();
        const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
        
        document.getElementById('end-date').value = today.toISOString().split('T')[0];
        document.getElementById('start-date').value = weekAgo.toISOString().split('T')[0];

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('stat-total').textContent = stats.total_detections || 0;
                document.getElementById('stat-alerts').textContent = stats.alerts_today || 0;
                document.getElementById('stat-suspicious').textContent = stats.suspicious_count || 0;
                document.getElementById('stat-crowd').textContent = stats.max_crowd || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        function generatePDF() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            window.open(`/api/report/generate?start=${start}&end=${end}`, '_blank');
        }

        function exportCSV() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            window.open(`/api/report/export-csv?start=${start}&end=${end}`, '_blank');
        }

        loadStats();
    </script>
</body>
</html>
